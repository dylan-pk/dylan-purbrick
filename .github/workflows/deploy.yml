name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write # Required to prune history

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Astro site
        run: npm run build

      - name: Upload production-ready build
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # THE JANITOR: Corrected JSON mapping
  prune-history:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Prune old runs
        run: |
          # The '| .[].databaseId' tells the processor to map over the array slice
          gh run list --repo ${{ github.repository }} --limit 100 --json databaseId -q '.[4:] | .[].databaseId' | xargs -r -I{} gh run delete --repo ${{ github.repository }} {}
        env:
          GH_TOKEN: ${{ github.token }}