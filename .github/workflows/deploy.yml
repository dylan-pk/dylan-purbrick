name Deploy to GitHub Pages

on
  push
    branches [ main ]

permissions
  contents read
  pages write
  id-token write

# This environment variable fixes the deprecation error
env
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 true

jobs
  build
    runs-on ubuntu-latest
    steps
      - name Checkout
        uses actionscheckout@v4

      - name Set up Node.js
        uses actionssetup-node@v4
        with
          node-version 24 # Updated from 20 to 24
          cache 'npm'

      - name Install dependencies
        run npm install

      - name Build Astro site
        run npm run build

      - name Upload production-ready build
        uses actionsupload-pages-artifact@v3
        with
          path .dist

  deploy
    needs build
    runs-on ubuntu-latest
    environment
      name github-pages
      url ${{ steps.deployment.outputs.page_url }}
    steps
      - name Deploy to GitHub Pages
        id deployment
        uses actionsdeploy-pages@v4
